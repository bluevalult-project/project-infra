---
- name: Prepare Kubernetes Node (Disable Swap, Load Modules, Configure Sysctl, Install CRI-O and K8s)
  hosts: k8s_nodes
  become: true

  collections:
    - community.general

  vars:
    kubernetes_version: "v1.32"
    crio_version: "v1.32"

  tasks:
    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Remove swap entries from /etc/fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^[^#].*swap'
        state: absent

    - name: Create /etc/modules-load.d/crio.conf
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/crio.conf
        mode: '0644'

    - name: Load overlay kernel module
      community.general.modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter kernel module
      community.general.modprobe:
        name: br_netfilter
        state: present

    - name: Configure Kubernetes sysctl parameters
      ansible.builtin.copy:
        content: |
          net.bridge.bridge-nf-call-ip6tables = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
        dest: /etc/sysctl.d/kubernetes.conf
        mode: '0644'

    - name: Apply sysctl parameters
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - software-properties-common
          - curl
          - gpg
        state: present
        update_cache: true

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # Kubernetes repo key
    - name: Download Kubernetes GPG key (ASCII)
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/Release.key"
        dest: "/etc/apt/keyrings/kubernetes-apt-keyring.asc"
        mode: '0644'
        force: true

    - name: Convert Kubernetes key to binary GPG format
      ansible.builtin.shell: |
        gpg --dearmor < /etc/apt/keyrings/kubernetes-apt-keyring.asc > /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/ /"
        state: present
        filename: kubernetes

    # CRI-O repo key
    - name: Download CRI-O GPG key (ASCII)
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ crio_version }}/deb/Release.key"
        dest: "/etc/apt/keyrings/cri-o-apt-keyring.asc"
        mode: '0644'
        force: true

    - name: Convert CRI-O key to binary GPG format
      ansible.builtin.shell: |
        gpg --dearmor < /etc/apt/keyrings/cri-o-apt-keyring.asc > /etc/apt/keyrings/cri-o-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/cri-o-apt-keyring.gpg

    - name: Add CRI-O apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/cri-o-apt-keyring.gpg] https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ crio_version }}/deb/ /"
        state: present
        filename: cri-o

    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install CRI-O and Kubernetes components
      ansible.builtin.apt:
        name:
          - cri-o
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Hold kubelet, kubeadm, kubectl
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable and start CRI-O service
      ansible.builtin.systemd:
        name: crio
        enabled: true
        state: started

    - name: Enable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started
